name: Create WordPress Draft

on:
  workflow_dispatch:
    inputs:
      article_path:
        description: HTML or Markdown file to create as a WordPress draft
        required: true
        default: public/yyc-sefure.html

defaults:
  run:
    shell: bash

jobs:
  create-draft:
    runs-on: ubuntu-latest
    env:
      WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
      WP_USERNAME: ${{ secrets.WP_USERNAME }}
      WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
      ARTICLE_PATH: ${{ inputs.article_path || 'public/yyc-sefure.html' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Create WordPress draft
        run: npm run wp:draft -- "$ARTICLE_PATH"
